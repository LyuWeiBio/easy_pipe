name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and development tools
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Ruff lint
        run: |
          if ! ruff check .; then
            ruff check . --fix
            git diff -- .
            exit 1
          fi
      - name: Ruff format
        run: |
          if ! ruff format --check .; then
            ruff format .
            git diff -- .
            exit 1
          fi
      - name: Mypy
        run: mypy src remote_probe/src remote_probe/build_zipapp.py remote_executor/src remote_executor/build_zipapp.py
      - name: Reproducible zipapp build smoke
        env:
          SOURCE_DATE_EPOCH: "315532800"
        run: |
          python remote_probe/build_zipapp.py
          python remote_executor/build_zipapp.py
      - name: Wheel install and public-contract smoke
        run: |
          release_dir="$(mktemp -d)"
          mkdir -p "$release_dir/wheels"
          python -m pip wheel --no-deps \
            --wheel-dir "$release_dir/wheels" .
          python -m venv --system-site-packages "$release_dir/venv"
          "$release_dir/venv/bin/python" -m pip install \
            --no-index --no-deps "$release_dir"/wheels/easy_pipe-*.whl
          "$release_dir/venv/bin/biopipe" version --json
          "$release_dir/venv/bin/biopipe" schema list --json
      - name: Tests
        run: python -m pytest --cov=biopipe --cov=bioprobe --cov=bioexec --cov-report=term-missing

  remote-python39:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: pip
      - name: Install remote-agent test dependency
        run: python -m pip install 'pytest>=8,<9'
      - name: Python 3.9 remote-agent compatibility
        env:
          PYTHONPATH: remote_executor/src
          SOURCE_DATE_EPOCH: "315532800"
        run: |
          python -m compileall -q remote_executor/src remote_executor/build_zipapp.py
          python remote_executor/build_zipapp.py
          python -m pytest remote_executor/tests
